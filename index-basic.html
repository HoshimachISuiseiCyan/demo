<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>AI刷题系统</title>
</head>
<body>

<h1>AI刷题系统</h1>

<button onclick="loadQuestions()">获取题目</button>

<div id="questions"></div>

<script>
async function loadQuestions() {
  const res = await fetch("http://127.0.0.1:8000/questions?user_id=demo_user");
  const data = await res.json();

  const container = document.getElementById("questions");
  container.innerHTML = "";

  data.questions.forEach(q => {
    const div = document.createElement("div");

    div.innerHTML = `
      <h3>${q.question}</h3>
      ${q.options.map(opt => `
        <label>
          <input type="radio" name="q${q.id}" value="${opt[0]}">
          ${opt}
        </label><br>
      `).join("")}
      <button onclick="submitAnswer(${q.id})">提交</button>
      <hr>
    `;

    container.appendChild(div);
  });
}

async function submitAnswer(questionId) {
  const selected = document.querySelector(`input[name="q${questionId}"]:checked`);

  if (!selected) {
    alert("请选择答案");
    return;
  }

  const answer = selected.value;

  const res = await fetch("http://127.0.0.1:8000/answer", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      user_id: "demo_user",
      question_id: questionId,
      answer: answer
    })
  });

  const data = await res.json();
  alert("结果：" + JSON.stringify(data));
}
</script>

</body>
</html>
